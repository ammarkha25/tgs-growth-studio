<section class="py-24 px-4 md:px-8">
  <div class="max-w-7xl mx-auto">
    <!-- Header -->
    <div class="text-center mb-16">
      <h1 class="section-title mb-4">Our Portfolio</h1>
      <p class="section-subtitle">
        Explore the ventures and solutions we've built across diverse industries
      </p>
    </div>

    <!-- Filter -->
    <div class="flex flex-wrap gap-3 justify-center mb-16">
      <button
        *ngFor="let category of categories"
        [ngClass]="{
          'btn-primary': selectedCategory === category,
          'btn-secondary': selectedCategory !== category
        }"
        (click)="selectCategory(category)"
        class="px-6 py-2 rounded-lg text-sm font-medium transition-all"
      >
        {{ category }}
      </button>
    </div>

    <!-- Grid -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
      <article
        *ngFor="let item of filteredItems"
        class="group bg-white dark:bg-slate-800 rounded-lg overflow-hidden hover:shadow-lg transition-shadow"
      >
        <div class="relative overflow-hidden aspect-video">
          <img
            [src]="item.image"
            [alt]="item.name"
            class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-300"
          />
          <div class="absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
            <span class="bg-primary text-white px-4 py-2 rounded-full text-sm font-medium">{{ item.status }}</span>
          </div>
        </div>

        <div class="p-6">
          <span class="inline-block text-xs font-semibold text-primary uppercase mb-2">{{ item.category }}</span>
          <h3 class="text-xl font-bold text-slate-900 dark:text-white mb-2">{{ item.name }}</h3>
          <p class="text-slate-600 dark:text-slate-300 text-sm mb-4">{{ item.description }}</p>
          <button class="text-primary hover:text-primary/80 font-semibold text-sm">Learn More →</button>
        </div>
      </article>
    </div>
  </div>
</section>
