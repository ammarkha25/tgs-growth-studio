<section class="py-24 px-4 md:px-8 bg-slate-50 dark:bg-slate-900/50">
  <div class="max-w-7xl mx-auto">
    <div class="text-center mb-20">
      <h1 class="section-title mb-4">Our Process</h1>
      <p class="section-subtitle">
        A proven three-phase methodology to take your venture from idea to scale
      </p>
    </div>

    <div class="space-y-12 mb-20">
      <div
        *ngFor="let phase of phases; let index = index"
        class="relative"
      >
        <!-- Timeline Connector -->
        <div
          *ngIf="index < phases.length - 1"
          class="absolute left-8 top-32 w-1 h-16 bg-gradient-to-b from-primary to-primary/20"
        ></div>

        <!-- Phase Card -->
        <div class="flex gap-8">
          <div class="flex flex-col items-center">
            <div class="w-16 h-16 bg-primary text-white rounded-full flex items-center justify-center font-bold text-lg mb-4 flex-shrink-0">
              {{ index + 1 }}
            </div>
          </div>
          
          <div class="flex-1 bg-white dark:bg-slate-800 rounded-lg p-8 shadow-sm hover:shadow-md transition-shadow">
            <h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-2">{{ phase.title }}</h2>
            <p class="text-primary font-semibold mb-4">⏱ {{ phase.duration }}</p>
            <p class="text-slate-600 dark:text-slate-300 mb-6">{{ phase.description }}</p>

            <div>
              <h4 class="font-bold text-slate-900 dark:text-white mb-3">Key Activities:</h4>
              <ul class="space-y-2">
                <li *ngFor="let task of phase.tasks" class="flex items-start gap-3">
                  <span class="text-primary font-bold mt-1">•</span>
                  <span class="text-slate-600 dark:text-slate-300">{{ task }}</span>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- CTA Section -->
    <div class="text-center bg-gradient-to-r from-primary/10 to-primary/5 rounded-lg p-12">
      <h3 class="text-3xl font-bold text-slate-900 dark:text-white mb-3">Ready to Start Your Journey?</h3>
      <p class="text-slate-600 dark:text-slate-300 mb-6 max-w-2xl mx-auto">
        Let's discuss how we can help build your next great venture.
      </p>
      <button class="btn-primary px-8 py-3">Schedule a Consultation</button>
    </div>
  </div>
</section>
